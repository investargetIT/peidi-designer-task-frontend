<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4158D0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C850C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFCC70;stop-opacity:1" />
    </linearGradient>

    <clipPath id="wipeMask">
      <rect x="0" y="0" width="0" height="300">
        <animate 
          attributeName="width" 
          from="0" 
          to="1200" 
          dur="2s" 
          begin="0s" 
          fill="freeze" 
          calcMode="spline" 
          keyTimes="0;1" 
          keySplines="0.42 0 0.58 1"
          repeatCount="indefinite" 
        />
      </rect>
    </clipPath>
  </defs>

  <!-- 白色背景 -->
  <rect width="100%" height="100%" fill="#ffffff" rx="10" />

  <text 
    x="50%" 
    y="50%" 
    dominant-baseline="middle" 
    text-anchor="middle" 
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" 
    font-weight="bold" 
    font-size="160" 
    fill="url(#textGradient)" 
    clip-path="url(#wipeMask)"
    style="letter-spacing: 2px;">
    Simply Design
  </text>
</svg>
